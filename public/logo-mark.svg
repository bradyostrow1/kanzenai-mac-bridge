<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 100 100">
  <!-- Enso (円相) — Japanese zen circle of completeness. Same root as 完全 (kanzen). -->
  <rect width="100" height="100" fill="#f0eee9"/>
  <!--
    Open circle drawn with stroke-dasharray to create a brushstroke gap at 5 o'clock.
    Circumference = 2π × 38 ≈ 238.76
    Visible arc = 215, gap = ~24 (about 36° opening)
    Rotate to position gap at bottom-right.
  -->
  <circle
    cx="50" cy="50" r="38"
    fill="none"
    stroke="#0a0a0a"
    stroke-width="7"
    stroke-linecap="round"
    stroke-dasharray="215 24"
    transform="rotate(-110 50 50)"
  />
</svg>
